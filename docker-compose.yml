services:

  backend:
    build:
      context: ./backend

    container_name: geo-rag-backend

    volumes:
      - ./backend:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    restart: unless-stopped

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  qdrant:
    image: qdrant/qdrant:latest

    container_name: geo-rag-qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - ./data/qdrant:/qdrant/storage

    restart: unless-stopped